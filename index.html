<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>J-Quants 株式相関分析</title>
<style>
body{font-family:Meiryo,sans-serif;margin:0;background:#f4f6f8;color:#1f2937}
header{background:#173a5e;color:#fff;padding:18px 24px;font-size:24px;font-weight:bold}
main{max-width:1180px;margin:18px auto;padding:0 14px}
.card{background:#fff;padding:18px;border-radius:12px;margin-bottom:14px;box-shadow:0 2px 8px #0001}
.grid{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 1fr;gap:12px;align-items:end}
label{font-weight:bold;display:block;margin-bottom:6px}
input,select{width:100%;padding:9px;border:1px solid #bbb;border-radius:7px;box-sizing:border-box}
button{padding:10px 15px;border:0;border-radius:7px;background:#2563eb;color:#fff;font-weight:bold;cursor:pointer;margin-right:8px;margin-top:8px}
button:disabled{opacity:.55;cursor:wait}
.green{background:#15803d}.gray{background:#475569}.red{background:#b91c1c}.purple{background:#6d28d9}
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.m{background:#eef4fb;padding:12px;border-radius:8px;text-align:center}
.m small{display:block;color:#64748b}.m b{font-size:19px}
.tabs{margin-bottom:10px}
.tabs button{background:#cbd5e1;color:#111}
.tabs button.active{background:#173a5e;color:#fff}
canvas{width:100%;height:500px;border:1px solid #ddd;border-radius:8px;background:#fff}
.status{margin-top:10px;background:#e2e8f0;padding:10px;border-radius:8px;line-height:1.6;white-space:pre-line}
.note{font-size:13px;color:#64748b;line-height:1.6}
progress{width:100%;height:18px;margin-top:10px;display:none}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin:8px 0 0}
.legend span{font-size:13px}
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px}
@media(max-width:900px){
 .grid{grid-template-columns:1fr 1fr}
 .metrics{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<header>J-Quants 株式相関分析アプリ</header>
<main>

<div class="card">
<h3>最新CSV</h3>
<button id="githubLoad" class="purple">最新データを再取得</button>
<p class="note">ページを開くと、GitHub Pages上の最新CSVを自動取得します。</p>
<progress id="progress" max="100"></progress>
</div>

<div class="card">
<div class="grid">
<div>
<label>銘柄A</label>
<input id="a" value="7203" placeholder="7203">
</div>
<div>
<label>銘柄B</label>
<input id="b" value="7267" placeholder="7267">
</div>
<div>
<label>分析期間</label>
<select id="period">
<option value="20">20日</option>
<option value="60">60日</option>
<option value="100" selected>100日</option>
<option value="250">250日</option>
<option value="all">全期間</option>
</select>
</div>
<div>
<label>移動相関日数</label>
<input id="roll" type="number" value="20" min="2" max="250">
</div>
<div>
<label>&nbsp;</label>
<button id="analyze" class="green">相関分析</button>
</div>
</div>

<button id="save" class="gray">結果CSV保存</button>
<button id="clear" class="red">クリア</button>
<div class="status" id="status">最新データを自動取得しています…</div>
</div>

<div class="card">
<div class="metrics">
<div class="m"><small>相関係数</small><b id="corr">-</b></div>
<div class="m"><small>判定</small><b id="judge">-</b></div>
<div class="m"><small>共通日数</small><b id="days">-</b></div>
<div class="m"><small>最新サヤ</small><b id="spread">-</b></div>
<div class="m"><small>Zスコア</small><b id="z">-</b></div>
<div class="m"><small>使用価格</small><b id="field">-</b></div>
</div>
</div>

<div class="card">
<div class="tabs">
<button class="active" data-tab="index">指数化株価</button>
<button data-tab="scatter">散布図</button>
<button data-tab="rolling">移動相関</button>
<button data-tab="spread">サヤ</button>
</div>
<canvas id="cv" width="1120" height="500"></canvas>
<div class="legend" id="legend"></div>
</div>

</main>

<script>
"use strict";

const $ = id => document.getElementById(id);
let csvText = "";
let result = null;
let activeChart = "index";

function normalizeCode(value){
  let code = String(value ?? "").trim().replace(/\.0$/, "");
  if(/^\d{5}$/.test(code) && code.endsWith("0")){
    code = code.slice(0, 4);
  }
  return code;
}

function parseCsvLine(line){
  const values = [];
  let value = "";
  let quoted = false;

  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c === '"'){
      if(quoted && line[i+1] === '"'){
        value += '"';
        i++;
      }else{
        quoted = !quoted;
      }
    }else if(c === "," && !quoted){
      values.push(value);
      value = "";
    }else{
      value += c;
    }
  }
  values.push(value);
  return values;
}

async function loadLatest(){
  $("githubLoad").disabled = true;
  $("progress").style.display = "block";
  $("progress").removeAttribute("value");
  $("status").textContent = "最新CSVを取得しています…";

  try{
    const response = await fetch(
      "./jquants_latest.csv.gz?t=" + Date.now(),
      {cache:"no-store"}
    );

    if(!response.ok){
      throw new Error("データ取得失敗：HTTP " + response.status);
    }

    if(!response.body){
      throw new Error("ブラウザがgzip展開に対応していません。");
    }

    const stream = response.body.pipeThrough(
      new DecompressionStream("gzip")
    );

    csvText = await new Response(stream).text();

    const firstLine = csvText.slice(0, csvText.indexOf("\n"));
    if(!firstLine.includes("Date") ||
       !firstLine.includes("Code") ||
       !(firstLine.includes("AdjC") || firstLine.includes("C"))){
      throw new Error("CSVの列が想定と異なります。");
    }

    const count = (csvText.match(/\n/g) || []).length;

    $("status").textContent =
      "最新CSVの取得が完了しました。\n" +
      "データ行数：約" + count.toLocaleString() + "行";

  }catch(error){
    $("status").textContent =
      "最新データの取得に失敗しました。\n" + error.message;
  }finally{
    $("progress").style.display = "none";
    $("githubLoad").disabled = false;
  }
}

function avg(values){
  return values.reduce((s,v)=>s+v,0)/values.length;
}

function std(values){
  const mean = avg(values);
  return Math.sqrt(
    values.reduce((s,v)=>s+(v-mean)**2,0)/values.length
  );
}

function correlation(x,y){
  const mx = avg(x);
  const my = avg(y);
  let numerator = 0;
  let dx = 0;
  let dy = 0;

  for(let i=0;i<x.length;i++){
    const a = x[i]-mx;
    const b = y[i]-my;
    numerator += a*b;
    dx += a*a;
    dy += b*b;
  }

  const denominator = Math.sqrt(dx*dy);
  return denominator ? numerator/denominator : 0;
}

function judgeCorrelation(value){
  if(value >= 0.80) return "非常に強い正相関";
  if(value >= 0.70) return "強い正相関";
  if(value >= 0.30) return "やや正相関";
  if(value > -0.30) return "相関が弱い";
  if(value > -0.70) return "やや逆相関";
  return "強い逆相関";
}

function analyze(){
  if(!csvText){
    alert("最新CSVの取得完了までお待ちください。");
    return;
  }

  const codeA = normalizeCode($("a").value);
  const codeB = normalizeCode($("b").value);

  if(!codeA || !codeB || codeA === codeB){
    alert("異なる2銘柄コードを入力してください。");
    return;
  }

  $("status").textContent = "分析しています…";

  setTimeout(()=>{
    try{
      const lines = csvText.replace(/\r/g,"").split("\n").filter(Boolean);
      const header = parseCsvLine(lines[0]).map(v=>v.trim());

      const dateIndex = header.findIndex(v=>v.toLowerCase()==="date");
      const codeIndex = header.findIndex(v=>v.toLowerCase()==="code");

      let priceIndex = header.findIndex(v=>v.toLowerCase()==="adjc");
      if(priceIndex < 0){
        priceIndex = header.findIndex(v=>v.toLowerCase()==="c");
      }
      if(priceIndex < 0){
        priceIndex = header.findIndex(v=>v.toLowerCase()==="close");
      }

      if(dateIndex < 0 || codeIndex < 0 || priceIndex < 0){
        throw new Error("Date・Code・AdjCまたはC列が必要です。");
      }

      const mapA = new Map();
      const mapB = new Map();

      for(let i=1;i<lines.length;i++){
        const row = parseCsvLine(lines[i]);
        const code = normalizeCode(row[codeIndex]);
        if(code !== codeA && code !== codeB) continue;

        const date = String(row[dateIndex] ?? "").slice(0,10);
        const price = Number(String(row[priceIndex] ?? "").replace(/,/g,""));

        if(!date || !Number.isFinite(price) || price <= 0) continue;

        if(code === codeA) mapA.set(date,price);
        if(code === codeB) mapB.set(date,price);
      }

      let rows = [];

      for(const [date,priceA] of mapA){
        if(mapB.has(date)){
          rows.push({
            date,
            a:priceA,
            b:mapB.get(date)
          });
        }
      }

      rows.sort((x,y)=>x.date.localeCompare(y.date));

      const period = $("period").value;
      if(period !== "all"){
        rows = rows.slice(-Number(period));
      }

      if(rows.length < 3){
        throw new Error(
          "共通データが不足しています。\n" +
          "銘柄A：" + mapA.size + "日\n" +
          "銘柄B：" + mapB.size + "日"
        );
      }

      rows.forEach((row,index)=>{
        row.indexA = row.a/rows[0].a*100;
        row.indexB = row.b/rows[0].b*100;
        row.spread = row.indexA-row.indexB;

        if(index > 0){
          row.returnA = row.a/rows[index-1].a-1;
          row.returnB = row.b/rows[index-1].b-1;
        }else{
          row.returnA = null;
          row.returnB = null;
        }
      });

      const returns = rows.slice(1);
      const corr = correlation(
        returns.map(r=>r.returnA),
        returns.map(r=>r.returnB)
      );

      const spreads = rows.map(r=>r.spread);
      const meanSpread = avg(spreads);
      const spreadStd = std(spreads);
      const latestSpread = spreads[spreads.length-1];
      const zScore = spreadStd
        ? (latestSpread-meanSpread)/spreadStd
        : 0;

      const rollingDays = Math.max(
        2,
        Math.min(
          Number($("roll").value) || 20,
          rows.length
        )
      );

      rows.forEach((row,index)=>{
        if(index < rollingDays){
          row.rollingCorrelation = null;
          return;
        }

        const windowRows = rows
          .slice(index-rollingDays+1,index+1)
          .filter(r=>r.returnA !== null && r.returnB !== null);

        if(windowRows.length < 3){
          row.rollingCorrelation = null;
        }else{
          row.rollingCorrelation = correlation(
            windowRows.map(r=>r.returnA),
            windowRows.map(r=>r.returnB)
          );
        }
      });

      result = {
        codeA,
        codeB,
        rows,
        corr,
        latestSpread,
        zScore,
        meanSpread,
        spreadStd,
        rollingDays,
        priceField:header[priceIndex]
      };

      $("corr").textContent = corr.toFixed(3);
      $("judge").textContent = judgeCorrelation(corr);
      $("days").textContent = rows.length;
      $("spread").textContent = latestSpread.toFixed(2);
      $("z").textContent = zScore.toFixed(2);
      $("field").textContent = header[priceIndex];

      $("status").textContent =
        "分析完了：" + codeA + " × " + codeB;

      drawChart();

    }catch(error){
      $("status").textContent =
        "分析に失敗しました。\n" + error.message;
      alert(error.message);
    }
  },50);
}

function setLegend(items){
  $("legend").innerHTML = items.map(item=>
    '<span><i class="dot" style="background:' +
    item.color + '"></i>' + item.name + '</span>'
  ).join("");
}

function clearCanvas(){
  const canvas = $("cv");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  return {canvas,ctx};
}

function drawChart(){
  const {canvas,ctx} = clearCanvas();

  if(!result){
    ctx.fillStyle = "#64748b";
    ctx.font = "20px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(
      "最新CSVを取得し、2銘柄を入力して相関分析を押してください。",
      canvas.width/2,
      canvas.height/2
    );
    setLegend([]);
    return;
  }

  if(activeChart === "scatter"){
    drawScatter(canvas,ctx);
    return;
  }

  let series;
  let title;

  if(activeChart === "index"){
    series = [
      {
        name:result.codeA,
        color:"#2563eb",
        values:result.rows.map(r=>r.indexA)
      },
      {
        name:result.codeB,
        color:"#dc2626",
        values:result.rows.map(r=>r.indexB)
      }
    ];
    title = "指数化株価（開始日＝100）";
  }

  if(activeChart === "rolling"){
    series = [
      {
        name:result.rollingDays+"日移動相関",
        color:"#7c3aed",
        values:result.rows.map(r=>r.rollingCorrelation)
      }
    ];
    title = result.rollingDays+"日移動相関";
  }

  if(activeChart === "spread"){
    series = [
      {
        name:"サヤ",
        color:"#2563eb",
        values:result.rows.map(r=>r.spread)
      },
      {
        name:"平均",
        color:"#16a34a",
        values:result.rows.map(()=>result.meanSpread)
      },
      {
        name:"+2σ",
        color:"#dc2626",
        values:result.rows.map(
          ()=>result.meanSpread+2*result.spreadStd
        )
      },
      {
        name:"-2σ",
        color:"#f59e0b",
        values:result.rows.map(
          ()=>result.meanSpread-2*result.spreadStd
        )
      }
    ];
    title = "指数化サヤ";
  }

  drawLineChart(canvas,ctx,series,title);
}

function drawLineChart(canvas,ctx,series,title){
  const padding = {left:70,right:25,top:55,bottom:50};
  const width = canvas.width-padding.left-padding.right;
  const height = canvas.height-padding.top-padding.bottom;

  let allValues = [];
  series.forEach(s=>{
    allValues.push(...s.values.filter(Number.isFinite));
  });

  let min = Math.min(...allValues);
  let max = Math.max(...allValues);

  if(min === max){
    min -= 1;
    max += 1;
  }

  const margin = (max-min)*0.08;
  min -= margin;
  max += margin;

  ctx.fillStyle = "#111";
  ctx.font = "bold 20px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(title,canvas.width/2,30);

  for(let i=0;i<=5;i++){
    const y = padding.top+height*i/5;

    ctx.strokeStyle = "#ddd";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padding.left,y);
    ctx.lineTo(padding.left+width,y);
    ctx.stroke();

    const value = max-(max-min)*i/5;
    ctx.fillStyle = "#555";
    ctx.font = "12px sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(value.toFixed(2),padding.left-8,y+4);
  }

  series.forEach(s=>{
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2.2;
    ctx.beginPath();

    let started = false;

    s.values.forEach((value,index)=>{
      if(!Number.isFinite(value)) return;

      const x = padding.left+
        width*index/Math.max(1,s.values.length-1);

      const y = padding.top+
        height*(max-value)/(max-min);

      if(!started){
        ctx.moveTo(x,y);
        started = true;
      }else{
        ctx.lineTo(x,y);
      }
    });

    ctx.stroke();
  });

  setLegend(series.map(s=>({
    name:s.name,
    color:s.color
  })));
}

function drawScatter(canvas,ctx){
  const rows = result.rows.slice(1);
  const xValues = rows.map(r=>r.returnA);
  const yValues = rows.map(r=>r.returnB);

  let minX = Math.min(...xValues);
  let maxX = Math.max(...xValues);
  let minY = Math.min(...yValues);
  let maxY = Math.max(...yValues);

  const padding = {left:75,right:30,top:55,bottom:60};
  const width = canvas.width-padding.left-padding.right;
  const height = canvas.height-padding.top-padding.bottom;

  ctx.fillStyle = "#111";
  ctx.font = "bold 20px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(
    "日次騰落率散布図　r＝"+result.corr.toFixed(3),
    canvas.width/2,
    30
  );

  ctx.strokeStyle = "#ddd";

  for(let i=0;i<=5;i++){
    const x = padding.left+width*i/5;
    const y = padding.top+height*i/5;

    ctx.beginPath();
    ctx.moveTo(x,padding.top);
    ctx.lineTo(x,padding.top+height);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(padding.left,y);
    ctx.lineTo(padding.left+width,y);
    ctx.stroke();
  }

  ctx.fillStyle = "#2563eb";

  rows.forEach(row=>{
    const x = padding.left+
      width*(row.returnA-minX)/(maxX-minX || 1);

    const y = padding.top+
      height*(maxY-row.returnB)/(maxY-minY || 1);

    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle = "#555";
  ctx.font = "13px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(
    result.codeA+" 日次騰落率",
    padding.left+width/2,
    canvas.height-15
  );

  setLegend([
    {name:"日次騰落率",color:"#2563eb"}
  ]);
}

function saveResult(){
  if(!result){
    alert("先に相関分析を実行してください。");
    return;
  }

  const lines = [
    "Date,"+
    result.codeA+","+
    result.codeB+
    ",ReturnA,ReturnB,IndexA,IndexB,Spread,RollingCorrelation"
  ];

  result.rows.forEach(row=>{
    lines.push([
      row.date,
      row.a,
      row.b,
      row.returnA ?? "",
      row.returnB ?? "",
      row.indexA,
      row.indexB,
      row.spread,
      row.rollingCorrelation ?? ""
    ].join(","));
  });

  const blob = new Blob(
    ["\ufeff"+lines.join("\n")],
    {type:"text/csv"}
  );

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download =
    "correlation_"+result.codeA+"_"+result.codeB+".csv";
  link.click();
  URL.revokeObjectURL(link.href);
}

function clearAll(){
  result = null;

  ["corr","judge","days","spread","z","field"]
    .forEach(id=>$(id).textContent="-");

  $("status").textContent =
    csvText
      ? "入力内容をクリアしました。最新CSVは読込済みです。"
      : "最新CSVを取得してください。";

  drawChart();
}

document.querySelectorAll("[data-tab]").forEach(button=>{
  button.addEventListener("click",()=>{
    document.querySelectorAll("[data-tab]")
      .forEach(b=>b.classList.remove("active"));

    button.classList.add("active");
    activeChart = button.dataset.tab;
    drawChart();
  });
});

$("githubLoad").addEventListener("click",loadLatest);
$("analyze").addEventListener("click",analyze);
$("save").addEventListener("click",saveResult);
$("clear").addEventListener("click",clearAll);

window.addEventListener("DOMContentLoaded",()=>{
  drawChart();
  loadLatest();
});
</script>
</body>
</html>
